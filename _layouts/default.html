<!DOCTYPE html>
<html lang="{{ page.lang | default: " en" }}">
{%- include head.html -%}

<style>
  /* Container fills available space */
  .repl {
    display: none;
    flex-direction: column;
    height: 50vh;
    width: 100%;
    background: #0f0f0f;
    color: #eaeaea;
    font-family: monospace;
    font-size: 14px;
  }

  /* Scrollable output area */
  .repl-output {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    padding: 12px;
    white-space: pre;
    /* white-space: pre-wrap; */
  }

  /* Each entry */
  .repl-entry {
    margin-bottom: 10px;
  }

  /* Input line fixed at bottom */
  .repl-input-line {
    display: flex;
    padding: 10px;
    border-top: 1px solid #333;
    background: #111;
    color: black;
  }

  /* Prompt */
  .prompt {
    margin-right: 8px;
    color: white;
  }

  /* Input field */
  #stdin {
    flex: 1;
    background: transparent;
    border: none;
    color: inherit;
    font-family: inherit;
    font-size: inherit;
    outline: none;
  }
</style>

<body a="{{ site.theme_config.appearance | default: " auto" }}">

  <div class="repl" id="repl">
    <div class="repl-output" id="stdout"></div>
    <div class="repl-input-line">
      <span class="prompt">&gt;</span>
      <input type="text" id="stdin" autofocus />
    </div>
  </div>

  <main class="page-content" aria-label="Content">
    <div class="w">
      {{ content }}
    </div>
  </main>

  {%-if site.goat_counter and jekyll.environment == "production"-%}
  {%-include goat_counter.html-%}
  {%-endif-%}

  {% if page.custom_js %}
  {% for js_file in page.custom_js %}
  <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
  {% endfor %}
  {% endif %}

  <script src="/assets/js/wasm_exec.js"></script>

  <script>
    const go = new Go();

    WebAssembly.instantiateStreaming(
      fetch("/assets/wasm/golisp.wasm"),
      go.importObject
    ).then((result) => {
      go.run(result.instance);
      exec('(fn k () (print "[^-^] Hey! You found me! I am niki, nice to meet you~"))')
    });

    const stdin = document.getElementById("stdin");
    const stdout = document.getElementById("stdout");
    const repl = document.getElementById("repl")

    /* Scroll to bottom */
    function scrollToBottom() {
      stdout.scrollTop = stdout.scrollHeight * 2;
    }

    /* Append a REPL entry */
    function appendEntry(input, result) {
      const entry = document.createElement("div");
      entry.className = "repl-entry";

      const line = document.createElement("div");
      line.innerHTML = `<span class="prompt">&gt;</span>${input}`;

      const output = document.createElement("div");
      output.textContent = result.replace(/\n+$/, ""); // trim trailing newlines

      entry.appendChild(line);
      entry.appendChild(output);

      stdout.appendChild(entry);
    }

    /* Handle input */
    stdin.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();

        const input = stdin.value;
        if (!input) return;

        let result;
        try {
          result = exec(input);
        } catch (err) {
          result = String(err);
        }

        appendEntry(input, result);

        stdin.value = "";
        scrollToBottom();
      }
    });

    window.addEventListener('keydown', function (e) {
      if (e.altKey && e.code === 'KeyX') {
        e.preventDefault();
        if (repl.style.display == "none") {
          repl.style.display = "flex"
          repl.style.overflow = "auto"
        } else {
          repl.style.display = "none"
        }
      }
    });

    /* Keep focus on input */
    // document.addEventListener("click", () => {
    //     stdin.focus();
    // });
  </script>

</body>

</html>
